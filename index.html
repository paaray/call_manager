<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ABG — Call Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ── Reset & Variables ──────────────────────────────────── */
:root {
  --navy:    #0D1B2A;
  --deep:    #162032;
  --blue:    #1F4E79;
  --mid:     #2E75B6;
  --sky:     #5BA3D9;
  --gold:    #C9922A;
  --goldlt:  #F0C040;
  --cream:   #FDF6EC;
  --white:   #FFFFFF;
  --g50:     #F8FAFC;
  --g100:    #EEF2F7;
  --g300:    #CBD5E1;
  --g500:    #64748B;
  --g700:    #334155;
  --green:   #166534;
  --greenlt: #DCFCE7;
  --red:     #991B1B;
  --redlt:   #FEE2E2;
  --amber:   #92400E;
  --amberlt: #FEF3C7;
  --card-bg: rgba(255,255,255,0.055);
  --card-border: rgba(255,255,255,0.09);
  --sh: 0 4px 24px rgba(0,0,0,0.25);
  --sh-lg: 0 12px 48px rgba(0,0,0,0.35);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html { height:100%; }
body {
  font-family:'DM Sans',sans-serif;
  background:var(--navy);
  color:var(--white);
  min-height:100%;
  overflow-x:hidden;
}
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 5%,  rgba(46,117,182,.2) 0%, transparent 60%),
    radial-gradient(ellipse 55% 70% at 88% 95%, rgba(201,146,42,.12) 0%, transparent 55%),
    repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(255,255,255,.018) 60px),
    repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(255,255,255,.018) 60px);
}

/* ── Layout ─────────────────────────────────────────────── */
#app { position:relative; z-index:1; display:flex; flex-direction:column; min-height:100vh; }

/* ── Top Bar ─────────────────────────────────────────────── */
.topbar {
  position:sticky; top:0; z-index:50;
  padding: calc(var(--safe-top) + 12px) 16px 12px;
  background:rgba(13,27,42,.85);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  border-bottom:1px solid rgba(255,255,255,.07);
}
.topbar-inner { max-width:700px; margin:0 auto; }
.topbar-row1 { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.brand { display:flex; flex-direction:column; }
.brand-abbr {
  font-size:10px; font-weight:600; letter-spacing:3.5px; color:var(--gold);
  text-transform:uppercase; margin-bottom:2px;
}
.brand-title {
  font-family:'Playfair Display',serif;
  font-size:20px; font-weight:900; line-height:1; color:var(--white);
}
.brand-title em { color:var(--goldlt); font-style:normal; }

.stats-row { display:flex; gap:8px; }
.stat {
  display:flex; flex-direction:column; align-items:center;
  background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1);
  border-radius:10px; padding:6px 12px; min-width:54px;
}
.stat-n { font-family:'Playfair Display',serif; font-size:18px; font-weight:700; color:var(--goldlt); line-height:1; }
.stat-l { font-size:9px; color:rgba(255,255,255,.4); letter-spacing:.8px; text-transform:uppercase; margin-top:1px; }

/* sync indicator */
.sync-row { display:flex; align-items:center; gap:6px; margin-bottom:10px; }
.sync-dot { width:7px; height:7px; border-radius:50%; background:#4ADE80; flex-shrink:0; }
.sync-dot.loading { background:var(--goldlt); animation:pulse .9s ease-in-out infinite alternate; }
.sync-dot.error   { background:#F87171; }
@keyframes pulse { to { opacity:.3; } }
.sync-text { font-size:11px; color:rgba(255,255,255,.4); }
.sync-btn {
  margin-left:auto; padding:4px 10px; border-radius:20px;
  background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.55); font-size:11px; font-weight:500;
  cursor:pointer; transition:all .2s; font-family:'DM Sans',sans-serif;
}
.sync-btn:hover { background:rgba(255,255,255,.12); color:var(--white); }

/* search + controls */
.search-row { display:flex; gap:8px; margin-bottom:10px; }
.search-wrap { flex:1; position:relative; }
.search-wrap svg { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:rgba(255,255,255,.3); pointer-events:none; }
.search-input {
  width:100%; padding:9px 12px 9px 36px;
  background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.11);
  border-radius:11px; color:var(--white); font-family:'DM Sans',sans-serif;
  font-size:14px; outline:none; transition:border-color .2s;
}
.search-input::placeholder { color:rgba(255,255,255,.28); }
.search-input:focus { border-color:var(--sky); }
.add-btn {
  padding:9px 16px; border-radius:11px; border:none;
  background:linear-gradient(135deg,var(--gold),var(--goldlt));
  color:var(--navy); font-family:'DM Sans',sans-serif; font-size:13px; font-weight:700;
  cursor:pointer; transition:all .2s; white-space:nowrap; display:flex; align-items:center; gap:5px;
}
.add-btn:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(201,146,42,.4); }
.add-btn:active { transform:scale(.97); }

/* filter pills */
.filters { display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none; }
.filters::-webkit-scrollbar { display:none; }
.fpill {
  padding:5px 14px; border-radius:20px; border:1px solid rgba(255,255,255,.11);
  background:rgba(255,255,255,.06); color:rgba(255,255,255,.55);
  font-size:12px; font-weight:500; cursor:pointer; white-space:nowrap;
  transition:all .2s; font-family:'DM Sans',sans-serif;
}
.fpill.active { background:var(--blue); border-color:var(--sky); color:var(--white); }

/* ── Cards ───────────────────────────────────────────────── */
.cards-wrap { flex:1; padding:16px 16px calc(var(--safe-bot) + 24px); }
.cards-inner { max-width:700px; margin:0 auto; display:flex; flex-direction:column; gap:14px; }

.card {
  background:var(--card-bg); border:1px solid var(--card-border);
  border-radius:20px; overflow:hidden;
  transition:border-color .2s, box-shadow .2s;
  animation:rise .35s ease both;
}
.card:hover { border-color:rgba(91,163,217,.25); }
@keyframes rise { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }

.card-top {
  display:flex; align-items:flex-start; gap:12px;
  padding:16px 16px 0;
}
.avatar {
  width:46px; height:46px; border-radius:14px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-family:'Playfair Display',serif; font-size:17px; font-weight:700;
}
.card-info { flex:1; min-width:0; }
.card-name { font-size:15px; font-weight:600; margin-bottom:3px; }
.card-tags { display:flex; flex-wrap:wrap; gap:4px; }
.tag {
  font-size:10px; padding:2px 7px; border-radius:20px;
  background:rgba(255,255,255,.08); color:rgba(255,255,255,.5);
}
.sbadge {
  font-size:9px; font-weight:700; letter-spacing:.5px;
  padding:3px 8px; border-radius:20px; text-transform:uppercase; flex-shrink:0; margin-top:2px;
}
.s-active   { background:var(--greenlt); color:var(--green); }
.s-inactive { background:var(--redlt);   color:var(--red); }
.s-pending  { background:var(--amberlt); color:var(--amber); }

/* call row */
.call-row { display:flex; gap:8px; padding:12px 16px; }
.dial-btn {
  flex:1; display:flex; align-items:center; gap:8px;
  padding:10px 14px; border-radius:12px;
  background:rgba(46,117,182,.14); border:1px solid rgba(46,117,182,.28);
  color:var(--sky); text-decoration:none; transition:all .2s; cursor:pointer;
  font-family:'DM Sans',sans-serif;
}
.dial-btn:hover,
.dial-btn:active { background:var(--mid); border-color:var(--sky); color:var(--white); }
.dial-btn svg { flex-shrink:0; }
.dial-num { font-size:14px; font-weight:500; letter-spacing:.3px; }
.wa-btn {
  width:40px; height:40px; border-radius:12px;
  background:rgba(37,211,102,.12); border:1px solid rgba(37,211,102,.22);
  color:#25D366; display:flex; align-items:center; justify-content:center;
  text-decoration:none; transition:all .2s; flex-shrink:0;
}
.wa-btn:hover { background:#25D366; color:var(--white); }
.log-btn {
  width:40px; height:40px; border-radius:12px;
  background:rgba(201,146,42,.12); border:1px solid rgba(201,146,42,.25);
  color:var(--goldlt); display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .2s; flex-shrink:0;
  font-family:'DM Sans',sans-serif;
}
.log-btn:hover { background:var(--gold); color:var(--white); }

/* logs section */
.logs-section { padding:0 16px 14px; }
.logs-toggle {
  display:flex; align-items:center; gap:6px; cursor:pointer;
  padding:6px 0; user-select:none;
}
.logs-toggle-label { font-size:11px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:rgba(255,255,255,.35); }
.logs-badge {
  font-size:10px; background:rgba(255,255,255,.1); border-radius:20px;
  padding:1px 6px; color:rgba(255,255,255,.45);
}
.logs-caret { font-size:11px; color:rgba(255,255,255,.25); margin-left:auto; transition:transform .2s; }
.logs-caret.open { transform:rotate(180deg); }
.logs-list { display:flex; flex-direction:column; gap:6px; margin-top:8px; }
.log-item {
  border-radius:10px; padding:9px 11px; border-left:2px solid;
  background:rgba(255,255,255,.035);
}
.log-item.reached    { border-color:#4ADE80; }
.log-item.no-answer  { border-color:#FBB040; }
.log-item.callback   { border-color:var(--sky); }
.log-item.follow-up  { border-color:var(--goldlt); }
.log-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:3px; }
.log-outcome { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
.log-outcome.reached   { color:#4ADE80; }
.log-outcome.no-answer { color:#FBB040; }
.log-outcome.callback  { color:var(--sky); }
.log-outcome.follow-up { color:var(--goldlt); }
.log-meta { font-size:10px; color:rgba(255,255,255,.28); }
.log-note { font-size:12px; color:rgba(255,255,255,.6); line-height:1.45; }
.no-logs { font-size:11px; color:rgba(255,255,255,.22); padding:4px 0; }

/* empty state */
.empty { text-align:center; padding:64px 20px; color:rgba(255,255,255,.28); }
.empty svg { opacity:.25; margin-bottom:14px; }
.empty strong { font-size:15px; display:block; margin-bottom:6px; }
.empty p { font-size:13px; }

/* ── Modals ──────────────────────────────────────────────── */
.overlay {
  position:fixed; inset:0; z-index:100;
  background:rgba(0,0,0,.7); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  display:flex; align-items:flex-end; justify-content:center; padding:0;
  opacity:0; pointer-events:none; transition:opacity .25s;
}
.overlay.show { opacity:1; pointer-events:all; }
.sheet {
  width:100%; max-width:520px; max-height:92vh;
  background:var(--deep); border-radius:24px 24px 0 0;
  border-top:1px solid rgba(255,255,255,.1);
  padding:0 20px calc(var(--safe-bot) + 24px);
  overflow-y:auto; transform:translateY(100%); transition:transform .3s cubic-bezier(.32,1.25,.5,1);
}
.overlay.show .sheet { transform:translateY(0); }
.sheet-handle {
  width:36px; height:4px; border-radius:2px;
  background:rgba(255,255,255,.15); margin:12px auto 20px;
}
.sheet-title {
  font-family:'Playfair Display',serif;
  font-size:20px; font-weight:700; margin-bottom:22px;
  display:flex; align-items:center; gap:9px; color:var(--white);
}
.sheet-title svg { color:var(--gold); }

/* form elements */
.frow { margin-bottom:14px; }
.flbl { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:rgba(255,255,255,.45); display:block; margin-bottom:5px; }
.finput, .fselect, .ftextarea {
  width:100%; padding:10px 13px;
  background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.11);
  border-radius:10px; color:var(--white); font-family:'DM Sans',sans-serif;
  font-size:14px; outline:none; transition:border-color .2s;
}
.finput::placeholder { color:rgba(255,255,255,.25); }
.finput:focus,.fselect:focus,.ftextarea:focus { border-color:var(--sky); background:rgba(255,255,255,.09); }
.fselect { cursor:pointer; }
.fselect option { background:var(--deep); }
.ftextarea { resize:vertical; min-height:80px; line-height:1.5; }
.f2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

/* outcome picker */
.outcome-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.oopt {
  padding:10px; border-radius:10px; border:1.5px solid rgba(255,255,255,.1);
  background:transparent; color:rgba(255,255,255,.55);
  font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500;
  cursor:pointer; transition:all .15s; text-align:center;
}
.oopt.sel                        { border-color:var(--sky); background:rgba(91,163,217,.18); color:var(--white); }
.oopt[data-v="reached"].sel      { border-color:#4ADE80; background:rgba(74,222,128,.15); color:#4ADE80; }
.oopt[data-v="no-answer"].sel    { border-color:#FBB040; background:rgba(251,176,64,.15);  color:#FBB040; }
.oopt[data-v="callback"].sel     { border-color:var(--sky); }
.oopt[data-v="follow-up"].sel    { border-color:var(--goldlt); background:rgba(240,192,64,.15); color:var(--goldlt); }

/* action buttons */
.actions { display:flex; gap:10px; margin-top:20px; }
.btn-cancel {
  flex:1; padding:13px; border-radius:13px;
  border:1px solid rgba(255,255,255,.11); background:transparent;
  color:rgba(255,255,255,.45); font-family:'DM Sans',sans-serif;
  font-size:14px; font-weight:500; cursor:pointer; transition:all .2s;
}
.btn-cancel:hover { background:rgba(255,255,255,.06); color:var(--white); }
.btn-primary {
  flex:2; padding:13px; border-radius:13px; border:none;
  background:linear-gradient(135deg,var(--blue),var(--mid));
  color:var(--white); font-family:'DM Sans',sans-serif;
  font-size:14px; font-weight:700; cursor:pointer; transition:all .2s;
  display:flex; align-items:center; justify-content:center; gap:7px;
}
.btn-primary:hover { box-shadow:0 4px 18px rgba(46,117,182,.45); }
.btn-primary:active { transform:scale(.98); }
.btn-primary.loading { opacity:.7; pointer-events:none; }
.spinner {
  width:16px; height:16px; border-radius:50%;
  border:2px solid rgba(255,255,255,.3); border-top-color:white;
  animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Toast ───────────────────────────────────────────────── */
.toast {
  position:fixed; bottom:calc(var(--safe-bot) + 20px); left:50%;
  transform:translateX(-50%) translateY(80px);
  background:rgba(22,32,50,.95); border:1px solid rgba(255,255,255,.12);
  color:var(--white); padding:11px 22px; border-radius:40px;
  font-size:13px; font-weight:500; z-index:300;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  display:flex; align-items:center; gap:7px; white-space:nowrap;
  box-shadow:var(--sh-lg); backdrop-filter:blur(12px);
}
.toast.show { transform:translateX(-50%) translateY(0); }
.tdot { width:7px; height:7px; border-radius:50%; background:#4ADE80; flex-shrink:0; }
.tdot.warn { background:#FBB040; }
.tdot.err  { background:#F87171; }

/* ── Setup Banner ────────────────────────────────────────── */
.setup-banner {
  margin:16px; border-radius:16px; padding:18px;
  background:linear-gradient(135deg,rgba(201,146,42,.15),rgba(201,146,42,.06));
  border:1px solid rgba(201,146,42,.3);
}
.setup-banner h3 { font-size:14px; font-weight:700; color:var(--goldlt); margin-bottom:6px; }
.setup-banner p  { font-size:12px; color:rgba(255,255,255,.55); line-height:1.6; }
.setup-banner code {
  background:rgba(255,255,255,.1); border-radius:5px;
  padding:1px 6px; font-size:11px; color:var(--goldlt); word-break:break-all;
}
.setup-link {
  display:inline-block; margin-top:10px; padding:8px 16px;
  border-radius:10px; background:var(--gold); color:var(--navy);
  font-size:12px; font-weight:700; text-decoration:none; transition:opacity .2s;
}
.setup-link:hover { opacity:.85; }
</style>
</head>
<body>
<div id="app">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-inner">
      <div class="topbar-row1">
        <div class="brand">
          <div class="brand-abbr">ABG Pentecost Assembly</div>
          <div class="brand-title">Call <em>Manager</em></div>
        </div>
        <div class="stats-row">
          <div class="stat"><div class="stat-n" id="sTotal">–</div><div class="stat-l">Total</div></div>
          <div class="stat"><div class="stat-n" id="sCalled">–</div><div class="stat-l">Called</div></div>
          <div class="stat"><div class="stat-n" id="sReached">–</div><div class="stat-l">Reached</div></div>
        </div>
      </div>

      <div class="sync-row">
        <div class="sync-dot" id="syncDot"></div>
        <div class="sync-text" id="syncText">Connecting to shared database…</div>
        <button class="sync-btn" onclick="loadAll()">↻ Refresh</button>
      </div>

      <div class="search-row">
        <div class="search-wrap">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input class="search-input" id="searchQ" placeholder="Search name, phone, group…" oninput="renderCards()">
        </div>
        <button class="add-btn" onclick="openAdd()">
          <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
          Add
        </button>
      </div>

      <div class="filters" id="filters">
        <button class="fpill active" data-f="all"       onclick="setFilter(this)">All</button>
        <button class="fpill"        data-f="not-called" onclick="setFilter(this)">Not Called</button>
        <button class="fpill"        data-f="reached"    onclick="setFilter(this)">Reached</button>
        <button class="fpill"        data-f="no-answer"  onclick="setFilter(this)">No Answer</button>
        <button class="fpill"        data-f="follow-up"  onclick="setFilter(this)">Follow-Up</button>
      </div>
    </div>
  </div>

  <!-- Cards -->
  <div class="cards-wrap">
    <div class="cards-inner" id="cardsInner">
      <div class="empty"><svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><strong>Loading…</strong></div>
    </div>
  </div>
</div>

<!-- Log Call Sheet -->
<div class="overlay" id="logOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.99 12 19.79 19.79 0 0 1 1.93 3.4 2 2 0 0 1 3.92 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      Log a Call
    </div>
    <div class="frow">
      <label class="flbl">Convert</label>
      <input class="finput" id="logName" readonly style="opacity:.55;cursor:default">
    </div>
    <div class="frow">
      <label class="flbl">Called by (your name)</label>
      <input class="finput" id="logCaller" placeholder="e.g. Bro. Emmanuel">
    </div>
    <div class="frow">
      <label class="flbl">Call Outcome *</label>
      <div class="outcome-grid">
        <button class="oopt" data-v="reached"   onclick="pickOutcome(this)">✅ Reached</button>
        <button class="oopt" data-v="no-answer" onclick="pickOutcome(this)">📵 No Answer</button>
        <button class="oopt" data-v="callback"  onclick="pickOutcome(this)">🔄 Call Back</button>
        <button class="oopt" data-v="follow-up" onclick="pickOutcome(this)">📋 Follow-Up</button>
      </div>
    </div>
    <div class="frow">
      <label class="flbl">Notes / Feedback</label>
      <textarea class="ftextarea" id="logNote" placeholder="What did you discuss? Any prayer requests, concerns or next steps?"></textarea>
    </div>
    <div class="actions">
      <button class="btn-cancel" onclick="closeSheet('logOverlay')">Cancel</button>
      <button class="btn-primary" id="logSaveBtn" onclick="saveLog()">

<script>
// ╔══════════════════════════════════════════════════════╗
// ║  CONFIG — paste your Apps Script Web App URL below  ║
// ╚══════════════════════════════════════════════════════╝
const API_URL = 'https://script.google.com/macros/s/AKfycbzeCz1vynoGYf23sIqBFUG8VVQCzHFEx2iYXL6PrheWzGARa8XP9v2dhsPR5FXglDKlmg/exec';
// Example: 'https://script.google.com/macros/s/AKfycbx.../exec'

// ── State ────────────────────────────────────────────────
let converts  = [];
let logs      = [];
let filter    = 'all';
let logTarget = null;
let selOutcome = '';

const AVATARS = [
  ['1F4E79','BDD7EE'],['2E75B6','DAEAF7'],['1A7A4A','C8F0D8'],
  ['7B3F00','FDEBD0'],['6B21A8','EDE9FE'],['C0392B','FDDEDE'],
  ['0E7490','CFFAFE'],['92400E','FEF3C7'],
];
const av = n => AVATARS[n.charCodeAt(0) % AVATARS.length];
const ini = n => n.split(' ').slice(0,2).map(x=>x[0]).join('').toUpperCase();
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtDate = d => d ? new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '';
const today = () => new Date().toISOString().split('T')[0];

// ── API Calls ─────────────────────────────────────────────
const isConfigured = () => API_URL && !API_URL.includes('YOUR_');

async function apiFetch(params) {
  const url = API_URL + '?' + new URLSearchParams(params);
  const r = await fetch(url, {
    method: 'GET',
    redirect: 'follow',
    cache: 'no-cache'
  });
  if (!r.ok) {
    const text = await r.text().catch(() => 'Unknown error');
    throw new Error(`HTTP ${r.status}: ${text.substring(0, 100)}`);
  }
  const text = await r.text();
  try {
    return JSON.parse(text);
  } catch(e) {
    throw new Error('Invalid JSON response: ' + text.substring(0, 100));
  }
}

async function apiPost(body) {
  const r = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
    mode: 'no-cors'   // Apps Script requires no-cors for POST
  });
  // no-cors returns opaque response — assume success
  return { success: true };
}

// ── Load All Data ─────────────────────────────────────────
async function loadAll() {
  setSyncState('loading', 'Syncing with Google Sheets…');

  if (!isConfigured()) {
    setSyncState('error', 'Not connected — demo mode (data is local only)');
    // Load demo data for preview
    converts = demoConverts();
    logs     = demoLogs();
    renderCards();
    updateStats();
    showSetupBanner();
    return;
  }

  try {
    const [cRes, lRes] = await Promise.all([
      apiFetch({ action: 'getConverts' }),
      apiFetch({ action: 'getLogs' }),
    ]);
    converts = cRes.data || [];
    logs     = lRes.data || [];
    setSyncState('ok', `Synced · ${converts.length} converts · ${new Date().toLocaleTimeString()}`);
    renderCards();
    updateStats();
  } catch(e) {
    console.error('Sync error:', e);
    setSyncState('error', 'Sync failed: ' + e.message.substring(0, 50));
    toast('Sync failed. Check browser console.', 'err');
  }
}

// ── Render ────────────────────────────────────────────────
function renderCards() {
  const q = (document.getElementById('searchQ').value || '').toLowerCase();
  const inner = document.getElementById('cardsInner');

  // Remove setup banner if present
  const banner = inner.querySelector('.setup-banner');

  let list = converts.filter(c => {
    if (q && !`${c.name} ${String(c.phone||'').trim()} ${c.group||''}`.toLowerCase().includes(q)) return false;
    const myLogs = logsFor(c.id);
    const last = myLogs[myLogs.length-1];
    if (filter === 'not-called')  return myLogs.length === 0;
    if (filter === 'reached')     return myLogs.some(l=>l.outcome==='reached');
    if (filter === 'no-answer')   return last && last.outcome==='no-answer';
    if (filter === 'follow-up')   return last && last.outcome==='follow-up';
    return true;
  });

  if (!list.length) {
    inner.innerHTML = `<div class="empty">
      <svg width="44" height="44" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      <strong>No converts found</strong><p>Adjust your search or filter.</p></div>`;
    if (banner) inner.prepend(banner);
    return;
  }

  inner.innerHTML = list.map((c,idx) => cardHtml(c, idx)).join('');
  if (banner) inner.prepend(banner);
}

function logsFor(id) {
  return logs.filter(l => String(l.convertId) === String(id))
             .sort((a,b) => new Date(a.date) - new Date(b.date));
}

function cardHtml(c, idx) {
  const [bg, fg] = av(c.name || '?');
  const waNum = String(c.whatsapp || c.phone || '').trim().replace(/\D/g,'');
  const myLogs = logsFor(c.id);
  const statusCls = `s-${c.status||'active'}`;
  const statusLbl = (c.status||'active').charAt(0).toUpperCase()+(c.status||'active').slice(1);

  const logsHtml = myLogs.length
    ? myLogs.slice().reverse().slice(0,5).map(l=>`
      <div class="log-item ${l.outcome||''}">
        <div class="log-head">
          <span class="log-outcome ${l.outcome||''}">${outcomeLabel(l.outcome)}</span>
          <span class="log-meta">${l.caller ? esc(l.caller)+' · ' : ''}${fmtDate(l.date)}</span>
        </div>
        ${l.note ? `<div class="log-note">${esc(l.note)}</div>` : ''}
      </div>`).join('')
    : '<div class="no-logs">No calls logged yet.</div>';

  return `
  <div class="card" style="animation-delay:${idx*0.04}s">
    <div class="card-top">
      <div class="avatar" style="background:#${bg};color:#${fg}">${ini(c.name||'?')}</div>
      <div class="card-info">
        <div class="card-name">${esc(c.name||'—')}</div>
        <div class="card-tags">
          ${c.gender ? `<span class="tag">${esc(c.gender)}</span>` : ''}
          ${c.salvationDate ? `<span class="tag">🕊 ${fmtDate(c.salvationDate)}</span>` : ''}
          ${c.group ? `<span class="tag">👥 ${esc(c.group)}</span>` : ''}
          ${c.mentor ? `<span class="tag">🤝 ${esc(c.mentor)}</span>` : ''}
        </div>
      </div>
      <div class="sbadge ${statusCls}">${statusLbl}</div>
    </div>

    <div class="call-row">
      <a class="dial-btn" href="tel:${esc(String(c.phone||'').trim())}" onclick="afterDial('${c.id}')">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.99 12 19.79 19.79 0 0 1 1.93 3.4 2 2 0 0 1 3.92 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <span class="dial-num">${esc(String(c.phone||'—').trim())}</span>
      </a>
      ${waNum ? `<a class="wa-btn" href="https://wa.me/${waNum}" target="_blank" title="WhatsApp">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
      </a>` : ''}
      <button class="log-btn" onclick="openLog('${c.id}')" title="Log a call">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
    </div>

    <div class="logs-section">
      <div class="logs-toggle" onclick="toggleLogs('lh-${c.id}',this)">
        <span class="logs-toggle-label">Call History</span>
        <span class="logs-badge">${myLogs.length}</span>
        <span class="logs-caret ${myLogs.length ? 'open' : ''}" id="lcarret-${c.id}">▾</span>
      </div>
      <div class="logs-list" id="lh-${c.id}" style="${myLogs.length ? '' : 'display:none'}">
        ${logsHtml}
      </div>
    </div>
  </div>`;
}

function toggleLogs(listId, toggleEl) {
  const el = document.getElementById(listId);
  const caret = toggleEl.querySelector('.logs-caret');
  const hidden = el.style.display === 'none';
  el.style.display = hidden ? 'flex' : 'none';
  caret.classList.toggle('open', hidden);
}

// ── Stats ─────────────────────────────────────────────────
function updateStats() {
  document.getElementById('sTotal').textContent   = converts.length;
  document.getElementById('sCalled').textContent  = converts.filter(c=>logsFor(c.id).length>0).length;
  document.getElementById('sReached').textContent = converts.filter(c=>logsFor(c.id).some(l=>l.outcome==='reached')).length;
}

// ── Filter ────────────────────────────────────────────────
function setFilter(btn) {
  filter = btn.dataset.f;
  document.querySelectorAll('.fpill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

// ── Log Call ──────────────────────────────────────────────
function openLog(id) {
  logTarget = id;
  selOutcome = '';
  const c = converts.find(x=>String(x.id)===String(id));
  document.getElementById('logName').value   = c ? c.name : '';
  document.getElementById('logCaller').value = '';
  document.getElementById('logNote').value   = '';
  document.querySelectorAll('.oopt').forEach(o=>o.classList.remove('sel'));
  openSheet('logOverlay');
}

function afterDial(id) {
  setTimeout(() => openLog(id), 1000);
}

function pickOutcome(btn) {
  document.querySelectorAll('.oopt').forEach(o=>o.classList.remove('sel'));
  btn.classList.add('sel');
  selOutcome = btn.dataset.v;
}

async function saveLog() {
  if (!selOutcome) { toast('Please select a call outcome', 'warn'); return; }
  const note   = document.getElementById('logNote').value.trim();
  const caller = document.getElementById('logCaller').value.trim();
  const logData = { convertId: logTarget, outcome: selOutcome, note, caller, date: today() };

  setLoading('logSaveBtn', true);

  // Optimistic update
  const tmpId = 'tmp_' + Date.now();
  logs.push({ ...logData, id: tmpId });
  renderCards(); updateStats();

  if (isConfigured()) {
    try {
      await apiPost({ action: 'addLog', data: logData });
      // Remove tmp and reload
      logs = logs.filter(l=>l.id!==tmpId);
      await loadAll();
    } catch(e) {
      toast('Saved locally — will sync on refresh', 'warn');
    }
  } else {
    toast('Saved locally (demo mode)', 'warn');
  }

  setLoading('logSaveBtn', false);
  closeSheet('logOverlay');
  toast('Call logged successfully ✓');
}

// ── Add Convert ───────────────────────────────────────────
function openAdd() {
  ['aName','aPhone','aWA','aGroup','aMentor'].forEach(id=>{ const el=document.getElementById(id); if(el)el.value=''; });
  document.getElementById('aGender').value = '';
  document.getElementById('aStatus').value = 'active';
  const sal = document.getElementById('aSal'); if(sal) sal.value='';
  openSheet('addOverlay');
}

async function saveConvert() {
  const name  = document.getElementById('aName').value.trim();
  const phone = document.getElementById('aPhone').value.trim();
  if (!name || !phone) { toast('Name and phone are required', 'warn'); return; }

  const data = {
    name, phone,
    gender:       document.getElementById('aGender').value,
    whatsapp:     document.getElementById('aWA').value.trim(),
    salvationDate:document.getElementById('aSal').value,
    group:        document.getElementById('aGroup').value.trim(),
    mentor:       document.getElementById('aMentor').value.trim(),
    status:       document.getElementById('aStatus').value,
  };

  setLoading('addSaveBtn', true);

  // Optimistic
  const tmpId = 'tmp_' + Date.now();
  converts.unshift({ ...data, id: tmpId });
  renderCards(); updateStats();

  if (isConfigured()) {
    try {
      await apiPost({ action: 'addConvert', data });
      converts = converts.filter(c=>c.id!==tmpId);
      await loadAll();
    } catch(e) {
      toast('Saved locally — will sync on refresh', 'warn');
    }
  } else {
    toast('Saved locally (demo mode)', 'warn');
  }

  setLoading('addSaveBtn', false);
  closeSheet('addOverlay');
  toast('Convert added ✓');
}

// ── UI Helpers ─────────────────────────────────────────────
function openSheet(id)  { document.getElementById(id).classList.add('show'); document.body.style.overflow='hidden'; }
function closeSheet(id) { document.getElementById(id).classList.remove('show'); document.body.style.overflow=''; }

function setLoading(btnId, on) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.classList.toggle('loading', on);
  btn.innerHTML = on
    ? '<div class="spinner"></div>'
    : (btnId === 'logSaveBtn' ? '<span>Save Log</span>' : '<span>Add Convert</span>');
}

function setSyncState(state, msg) {
  const dot  = document.getElementById('syncDot');
  const text = document.getElementById('syncText');
  dot.className  = 'sync-dot' + (state==='loading' ? ' loading' : state==='error' ? ' error' : '');
  text.textContent = msg;
}

let toastTimer;
function toast(msg, type='ok') {
  const el  = document.getElementById('toast');
  const dot = document.getElementById('tdot');
  const txt = document.getElementById('tmsg');
  dot.className = 'tdot' + (type==='warn' ? ' warn' : type==='err' ? ' err' : '');
  txt.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 3000);
}

function outcomeLabel(o) {
  return {reached:'✅ Reached','no-answer':'📵 No Answer',callback:'🔄 Callback','follow-up':'📋 Follow-Up'}[o]||o||'—';
}

function showSetupBanner() {
  const inner = document.getElementById('cardsInner');
  if (inner.querySelector('.setup-banner')) return;
  const banner = document.createElement('div');
  banner.className = 'setup-banner';
  banner.innerHTML = `
    <h3>⚙️ Connect to Google Sheets to enable shared team data</h3>
    <p>Follow the setup guide below to connect this app to your Google Sheet. Once done, all team members will share the same live data.</p>
    <p style="margin-top:8px">1. Open <strong>Google Apps Script</strong> → paste the <code>Code.gs</code> file → Deploy as Web App<br>
    2. Create a Google Sheet and copy its ID into <code>Code.gs</code><br>
    3. Replace <code>https://script.google.com/macros/s/AKfycbyNpsi9fpeZ532BE5kFbE2K7QuFmqjYGPg2n5vjU_M4Ydd5NHHwZ4dfrSqygDkTAe5_BQ/exec</code> in this HTML file with your deployment URL</p>
    <a class="setup-link" href="https://script.google.com" target="_blank">Open Google Apps Script →</a>`;
  inner.prepend(banner);
}

// Close overlays on backdrop tap
document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', e => { if(e.target===o) closeSheet(o.id); });
});
