<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABG — New Souls Call Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:    #0D1B2A;
    --deep:    #1A2E45;
    --blue:    #1F4E79;
    --mid:     #2E75B6;
    --sky:     #5BA3D9;
    --gold:    #C9922A;
    --goldlt:  #F5C842;
    --cream:   #FDF6EC;
    --white:   #FFFFFF;
    --gray50:  #F8FAFC;
    --gray100: #EEF2F7;
    --gray300: #CBD5E1;
    --gray500: #64748B;
    --gray700: #334155;
    --green:   #1A7A4A;
    --greenlt: #D1FAE5;
    --red:     #C0392B;
    --redlt:   #FEE2E2;
    --orange:  #D97706;
    --orangelt:#FEF3C7;
    --shadow:  0 4px 24px rgba(13,27,42,0.12);
    --shadow-lg: 0 12px 40px rgba(13,27,42,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background texture ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(46,117,182,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 85% 90%, rgba(201,146,42,0.10) 0%, transparent 55%),
      repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(255,255,255,0.02) 60px),
      repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,255,255,0.02) 60px);
    pointer-events: none; z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px 60px; }

  /* ── Header ── */
  header {
    padding: 32px 0 24px;
    display: flex; align-items: flex-end; justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    margin-bottom: 32px;
  }
  .brand { display: flex; flex-direction: column; gap: 4px; }
  .brand-church {
    font-family: 'Playfair Display', serif;
    font-size: 11px; font-weight: 700; letter-spacing: 4px;
    color: var(--gold); text-transform: uppercase;
  }
  .brand-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px; font-weight: 900; line-height: 1.1;
    color: var(--white);
  }
  .brand-title span { color: var(--goldlt); }
  .brand-sub {
    font-size: 12px; color: rgba(255,255,255,0.45); letter-spacing: 1px; margin-top: 2px;
  }
  .header-stats {
    display: flex; gap: 20px; align-items: flex-end;
  }
  .stat-pill {
    display: flex; flex-direction: column; align-items: center;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 10px 18px; gap: 2px;
    backdrop-filter: blur(8px);
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 700; color: var(--goldlt); line-height: 1;
  }
  .stat-label { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 1px; text-transform: uppercase; }

  /* ── Controls Bar ── */
  .controls {
    display: flex; gap: 12px; align-items: center; margin-bottom: 24px; flex-wrap: wrap;
  }
  .search-wrap {
    flex: 1; min-width: 200px; position: relative;
  }
  .search-wrap svg {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: rgba(255,255,255,0.35); pointer-events: none;
  }
  .search-input {
    width: 100%; padding: 11px 16px 11px 42px;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px; color: var(--white); font-family: 'DM Sans', sans-serif;
    font-size: 14px; outline: none; transition: all 0.2s;
    backdrop-filter: blur(8px);
  }
  .search-input::placeholder { color: rgba(255,255,255,0.3); }
  .search-input:focus { border-color: var(--sky); background: rgba(255,255,255,0.10); }

  .filter-btn {
    padding: 11px 18px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.7);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; backdrop-filter: blur(8px);
    white-space: nowrap;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--mid); border-color: var(--sky); color: var(--white);
  }
  .filter-btn.active { background: var(--blue); }

  .add-btn {
    padding: 11px 22px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, var(--gold), var(--goldlt));
    color: var(--navy); font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
    display: flex; align-items: center; gap: 6px;
  }
  .add-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(201,146,42,0.4); }

  /* ── Convert Cards Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 18px;
  }

  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 20px; padding: 22px;
    backdrop-filter: blur(12px);
    transition: all 0.25s; position: relative; overflow: hidden;
    animation: cardIn 0.4s ease both;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--mid), var(--sky));
    opacity: 0; transition: opacity 0.2s;
  }
  .card:hover { transform: translateY(-3px); border-color: rgba(91,163,217,0.3); box-shadow: var(--shadow-lg); }
  .card:hover::before { opacity: 1; }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 16px; }
  .avatar {
    width: 48px; height: 48px; border-radius: 14px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700;
    color: var(--white); position: relative;
  }
  .card-info { flex: 1; min-width: 0; }
  .card-name {
    font-size: 16px; font-weight: 600; color: var(--white);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .card-meta { font-size: 12px; color: rgba(255,255,255,0.45); display: flex; gap: 8px; flex-wrap: wrap; }
  .card-meta span { display: flex; align-items: center; gap: 3px; }

  .status-badge {
    font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
    padding: 3px 9px; border-radius: 20px; text-transform: uppercase; flex-shrink: 0;
  }
  .status-active   { background: var(--greenlt); color: var(--green); }
  .status-inactive { background: var(--redlt);   color: var(--red); }
  .status-pending  { background: var(--orangelt); color: var(--orange); }

  /* ── Call Button ── */
  .call-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .call-btn {
    display: flex; align-items: center; gap: 8px; flex: 1;
    padding: 10px 16px; border-radius: 11px;
    background: rgba(46,117,182,0.15); border: 1px solid rgba(46,117,182,0.3);
    color: var(--sky); font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500;
    text-decoration: none; transition: all 0.2s; cursor: pointer;
  }
  .call-btn:hover {
    background: var(--mid); border-color: var(--sky); color: var(--white);
    box-shadow: 0 4px 16px rgba(46,117,182,0.35); transform: translateX(2px);
  }
  .call-btn svg { flex-shrink: 0; }
  .call-num { flex: 1; font-size: 15px; letter-spacing: 0.5px; }

  .wa-btn {
    width: 38px; height: 38px; border-radius: 11px; border: none;
    background: rgba(37,211,102,0.15); border: 1px solid rgba(37,211,102,0.25);
    color: #25D366; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; text-decoration: none; flex-shrink: 0;
  }
  .wa-btn:hover { background: #25D366; color: white; border-color: #25D366; }

  /* ── Call History ── */
  .history-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px; cursor: pointer; user-select: none;
  }
  .history-label {
    font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.4);
    letter-spacing: 1px; text-transform: uppercase;
    display: flex; align-items: center; gap: 6px;
  }
  .history-count {
    background: rgba(255,255,255,0.1); border-radius: 20px;
    padding: 1px 7px; font-size: 10px;
  }
  .toggle-icon { font-size: 12px; color: rgba(255,255,255,0.3); transition: transform 0.2s; }
  .history-list { display: flex; flex-direction: column; gap: 6px; overflow: hidden; transition: all 0.3s; }
  .history-list.collapsed { display: none; }

  .log-entry {
    background: rgba(255,255,255,0.04); border-radius: 9px;
    padding: 8px 12px; font-size: 12px; border-left: 2px solid;
  }
  .log-entry.reached  { border-color: var(--green); }
  .log-entry.no-answer { border-color: var(--orange); }
  .log-entry.callback { border-color: var(--sky); }
  .log-entry.follow-up { border-color: var(--gold); }

  .log-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
  .log-outcome { font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .log-outcome.reached   { color: #4ADE80; }
  .log-outcome.no-answer { color: #FBB040; }
  .log-outcome.callback  { color: var(--sky); }
  .log-outcome.follow-up { color: var(--goldlt); }
  .log-date { color: rgba(255,255,255,0.3); font-size: 10px; }
  .log-caller { color: rgba(255,255,255,0.35); font-size: 10px; }
  .log-note { color: rgba(255,255,255,0.6); margin-top: 2px; line-height: 1.4; }

  /* ── Log Call Button ── */
  .log-call-btn {
    width: 100%; margin-top: 12px; padding: 9px;
    border-radius: 11px; border: 1px dashed rgba(255,255,255,0.15);
    background: transparent; color: rgba(255,255,255,0.4);
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; display: flex; align-items: center;
    justify-content: center; gap: 6px;
  }
  .log-call-btn:hover { border-color: var(--gold); color: var(--goldlt); background: rgba(201,146,42,0.07); }

  /* ── Empty State ── */
  .empty-state {
    text-align: center; padding: 80px 20px;
    color: rgba(255,255,255,0.3); font-size: 15px;
    grid-column: 1 / -1;
  }
  .empty-state svg { margin-bottom: 16px; opacity: 0.3; }
  .empty-state p { margin-top: 8px; font-size: 13px; }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65);
    backdrop-filter: blur(6px); z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--deep); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px; padding: 32px; width: 100%; max-width: 480px;
    max-height: 90vh; overflow-y: auto;
    transform: translateY(20px) scale(0.97); transition: transform 0.25s;
    box-shadow: var(--shadow-lg);
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 700; margin-bottom: 24px; color: var(--white);
    display: flex; align-items: center; gap: 10px;
  }
  .modal-title svg { color: var(--gold); }

  .form-row { margin-bottom: 16px; }
  .form-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.5); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; display: block; }
  .form-input, .form-select, .form-textarea {
    width: 100%; padding: 11px 14px;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; color: var(--white); font-family: 'DM Sans', sans-serif;
    font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--sky); }
  .form-select { cursor: pointer; }
  .form-select option { background: var(--deep); }
  .form-textarea { resize: vertical; min-height: 90px; }
  .form-two { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .outcome-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .outcome-opt {
    padding: 10px 12px; border-radius: 10px;
    border: 1.5px solid rgba(255,255,255,0.1);
    background: transparent; color: rgba(255,255,255,0.6);
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .outcome-opt:hover, .outcome-opt.selected {
    border-color: var(--sky); background: rgba(46,117,182,0.2); color: var(--white);
  }
  .outcome-opt[data-outcome="reached"].selected    { border-color: #4ADE80; background: rgba(74,222,128,0.15); color: #4ADE80; }
  .outcome-opt[data-outcome="no-answer"].selected  { border-color: #FBB040; background: rgba(251,176,64,0.15); color: #FBB040; }
  .outcome-opt[data-outcome="callback"].selected   { border-color: var(--sky); background: rgba(91,163,217,0.15); color: var(--sky); }
  .outcome-opt[data-outcome="follow-up"].selected  { border-color: var(--goldlt); background: rgba(245,200,66,0.15); color: var(--goldlt); }

  .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
  .btn-cancel {
    flex: 1; padding: 12px; border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.12); background: transparent;
    color: rgba(255,255,255,0.5); font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s;
  }
  .btn-cancel:hover { background: rgba(255,255,255,0.06); color: var(--white); }
  .btn-save {
    flex: 2; padding: 12px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, var(--blue), var(--mid));
    color: var(--white); font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .btn-save:hover { box-shadow: 0 4px 18px rgba(46,117,182,0.45); transform: translateY(-1px); }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--deep); border: 1px solid rgba(255,255,255,0.12);
    color: var(--white); padding: 12px 24px; border-radius: 40px;
    font-size: 13px; font-weight: 500; z-index: 200;
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
    display: flex; align-items: center; gap: 8px; white-space: nowrap;
    box-shadow: var(--shadow-lg);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ADE80; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    header { flex-direction: column; align-items: flex-start; gap: 16px; }
    .header-stats { width: 100%; justify-content: flex-start; }
    .form-two { grid-template-columns: 1fr; }
    .brand-title { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <header>
    <div class="brand">
      <div class="brand-church">ABG Pentecost Assembly</div>
      <div class="brand-title">New Souls <span>Call Manager</span></div>
      <div class="brand-sub">Retention Committee · Follow-Up Tool</div>
    </div>
    <div class="header-stats">
      <div class="stat-pill">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">Converts</div>
      </div>
      <div class="stat-pill">
        <div class="stat-num" id="statCalled">0</div>
        <div class="stat-label">Called</div>
      </div>
      <div class="stat-pill">
        <div class="stat-num" id="statReached">0</div>
        <div class="stat-label">Reached</div>
      </div>
    </div>
  </header>

  <!-- Controls -->
  <div class="controls">
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input class="search-input" type="text" id="searchInput" placeholder="Search by name, phone or group…">
    </div>
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('not-called', this)">Not Called</button>
    <button class="filter-btn" onclick="setFilter('reached', this)">Reached</button>
    <button class="filter-btn" onclick="setFilter('no-answer', this)">No Answer</button>
    <button class="add-btn" onclick="openAddModal()">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      Add Convert
    </button>
  </div>

  <!-- Cards Grid -->
  <div class="grid" id="cardsGrid"></div>
</div>

<!-- Log Call Modal -->
<div class="modal-overlay" id="logModal">
  <div class="modal">
    <div class="modal-title">
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.99 12 19.79 19.79 0 0 1 1.93 3.4 2 2 0 0 1 3.92 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
      </svg>
      Log Call
    </div>
    <div class="form-row">
      <label class="form-label">Convert Name</label>
      <input class="form-input" id="logName" readonly style="opacity:0.6; cursor:default;">
    </div>
    <div class="form-row">
      <label class="form-label">Called by (Your Name)</label>
      <input class="form-input" id="logCaller" placeholder="e.g. Bro. Emmanuel">
    </div>
    <div class="form-row">
      <label class="form-label">Call Outcome</label>
      <div class="outcome-grid">
        <button class="outcome-opt" data-outcome="reached" onclick="selectOutcome(this)">✅ Reached</button>
        <button class="outcome-opt" data-outcome="no-answer" onclick="selectOutcome(this)">📵 No Answer</button>
        <button class="outcome-opt" data-outcome="callback" onclick="selectOutcome(this)">🔄 Callback Later</button>
        <button class="outcome-opt" data-outcome="follow-up" onclick="selectOutcome(this)">📋 Needs Follow-Up</button>
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Notes / Feedback</label>
      <textarea class="form-textarea" id="logNote" placeholder="e.g. Spoke with convert. She mentioned she will attend Sunday. Needs prayer for family situation…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('logModal')">Cancel</button>
      <button class="btn-save" onclick="saveLog()">Save Call Log</button>
    </div>
  </div>
</div>

<!-- Add Convert Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-title">
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
        <line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>
      </svg>
      Add New Convert
    </div>
    <div class="form-two">
      <div class="form-row">
        <label class="form-label">Full Name *</label>
        <input class="form-input" id="addName" placeholder="e.g. Abena Mensah">
      </div>
      <div class="form-row">
        <label class="form-label">Gender</label>
        <select class="form-select" id="addGender">
          <option value="">Select</option>
          <option>Male</option>
          <option>Female</option>
        </select>
      </div>
    </div>
    <div class="form-two">
      <div class="form-row">
        <label class="form-label">Phone (Primary) *</label>
        <input class="form-input" id="addPhone" placeholder="e.g. 0244123456" type="tel">
      </div>
      <div class="form-row">
        <label class="form-label">WhatsApp No.</label>
        <input class="form-input" id="addWhatsapp" placeholder="If different" type="tel">
      </div>
    </div>
    <div class="form-two">
      <div class="form-row">
        <label class="form-label">Date of Salvation</label>
        <input class="form-input" id="addSalvation" type="date">
      </div>
      <div class="form-row">
        <label class="form-label">Small Group</label>
        <input class="form-input" id="addGroup" placeholder="e.g. Group A">
      </div>
    </div>
    <div class="form-two">
      <div class="form-row">
        <label class="form-label">Assigned Mentor</label>
        <input class="form-input" id="addMentor" placeholder="e.g. Bro. Kwame">
      </div>
      <div class="form-row">
        <label class="form-label">Status</label>
        <select class="form-select" id="addStatus">
          <option value="active">Active</option>
          <option value="pending">Pending</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn-save" onclick="saveConvert()">Add Convert</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span id="toastMsg">Saved!</span>
</div>

<script>
// ── Data Store ──────────────────────────────────────────────────
const STORAGE_KEY = 'abg_converts';

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultData(); }
  catch { return defaultData(); }
}
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

function defaultData() {
  return [
    { id: 1, name: "Abena Owusu", gender: "Female", phone: "0244567890", whatsapp: "0244567890", salvationDate: "2024-11-03", group: "Group A", mentor: "Sis. Adwoa", status: "active", logs: [
      { outcome: "reached", note: "Spoke with her. Very excited about the converts class. Will attend Sunday.", caller: "Bro. Emmanuel", date: "2024-11-08" }
    ]},
    { id: 2, name: "Kofi Asante", gender: "Male", phone: "0201234567", whatsapp: "", salvationDate: "2024-11-03", group: "Group B", mentor: "Bro. Samuel", status: "active", logs: [] },
    { id: 3, name: "Efua Darko", gender: "Female", phone: "0277890123", whatsapp: "0277890123", salvationDate: "2024-10-27", group: "Group A", mentor: "Sis. Adwoa", status: "pending", logs: [
      { outcome: "no-answer", note: "Called twice. No response.", caller: "Bro. Joseph", date: "2024-11-01" },
      { outcome: "callback", note: "Got through briefly. She asked for a callback on Saturday morning.", caller: "Bro. Joseph", date: "2024-11-04" }
    ]},
    { id: 4, name: "Kwame Boateng", gender: "Male", phone: "0264321098", whatsapp: "0264321098", salvationDate: "2024-11-10", group: "Group C", mentor: "Bro. Emmanuel", status: "active", logs: [] },
    { id: 5, name: "Akosua Mensah", gender: "Female", phone: "0233456789", whatsapp: "", salvationDate: "2024-10-20", group: "Group B", mentor: "Sis. Grace", status: "inactive", logs: [
      { outcome: "reached", note: "She has relocated temporarily but promises to rejoin after December.", caller: "Sis. Grace", date: "2024-11-05" }
    ]},
    { id: 6, name: "Yaw Amponsah", gender: "Male", phone: "0258765432", whatsapp: "0258765432", salvationDate: "2024-11-10", group: "Group C", mentor: "Bro. Samuel", status: "active", logs: [] },
  ];
}

let converts = loadData();
let currentFilter = 'all';
let currentLogId = null;
let selectedOutcome = '';

// ── Avatar colours ──────────────────────────────────────────────
const avatarPalette = [
  ['1F4E79','D6E4F0'],['2E75B6','BDD7EE'],['1A7A4A','D1FAE5'],
  ['7B3F00','FDEBD0'],['6B21A8','EDE9FE'],['C00000','FFDEDE'],
  ['0E7490','CFFAFE'],['92400E','FEF3C7'],
];
function avatarStyle(name) {
  const idx = name.charCodeAt(0) % avatarPalette.length;
  const [bg, fg] = avatarPalette[idx];
  return `background:#${bg}; color:#${fg};`;
}
function initials(name) {
  return name.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();
}

// ── Last call outcome for a convert ────────────────────────────
function lastOutcome(conv) {
  if (!conv.logs.length) return null;
  return conv.logs[conv.logs.length - 1].outcome;
}

// ── Stats ───────────────────────────────────────────────────────
function updateStats() {
  const total   = converts.length;
  const called  = converts.filter(c => c.logs.length > 0).length;
  const reached = converts.filter(c => c.logs.some(l => l.outcome === 'reached')).length;
  document.getElementById('statTotal').textContent   = total;
  document.getElementById('statCalled').textContent  = called;
  document.getElementById('statReached').textContent = reached;
}

// ── Render ──────────────────────────────────────────────────────
function render() {
  const q    = document.getElementById('searchInput').value.trim().toLowerCase();
  const grid = document.getElementById('cardsGrid');
  updateStats();

  let list = converts.filter(c => {
    const matchQ = !q || c.name.toLowerCase().includes(q) || c.phone.includes(q) || (c.group||'').toLowerCase().includes(q);
    if (!matchQ) return false;
    if (currentFilter === 'all') return true;
    if (currentFilter === 'not-called') return c.logs.length === 0;
    if (currentFilter === 'reached')    return c.logs.some(l=>l.outcome==='reached');
    if (currentFilter === 'no-answer')  return lastOutcome(c) === 'no-answer';
    return true;
  });

  if (!list.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <strong>No converts found</strong>
        <p>Try adjusting your search or filter, or add a new convert.</p>
      </div>`;
    return;
  }

  grid.innerHTML = list.map(c => {
    const lo = lastOutcome(c);
    const statusClass = `status-${c.status}`;
    const statusLabel = c.status.charAt(0).toUpperCase() + c.status.slice(1);
    const waNum = (c.whatsapp || c.phone).replace(/\D/g,'');
    const logsHtml = c.logs.length ? c.logs.slice().reverse().map(l => `
      <div class="log-entry ${l.outcome}">
        <div class="log-top">
          <span class="log-outcome ${l.outcome}">${outcomeLabel(l.outcome)}</span>
          <span class="log-date">${formatDate(l.date)}</span>
        </div>
        ${l.caller ? `<div class="log-caller">by ${l.caller}</div>` : ''}
        ${l.note ? `<div class="log-note">${escHtml(l.note)}</div>` : ''}
      </div>`).join('') : '<div style="font-size:12px;color:rgba(255,255,255,0.25);padding:4px 0;">No call logs yet.</div>';

    return `
    <div class="card" data-id="${c.id}">
      <div class="card-header">
        <div class="avatar" style="${avatarStyle(c.name)}">${initials(c.name)}</div>
        <div class="card-info">
          <div class="card-name">${escHtml(c.name)}</div>
          <div class="card-meta">
            ${c.gender ? `<span>⚧ ${c.gender}</span>` : ''}
            ${c.salvationDate ? `<span>🕊 ${formatDate(c.salvationDate)}</span>` : ''}
            ${c.group ? `<span>👥 ${escHtml(c.group)}</span>` : ''}
          </div>
          ${c.mentor ? `<div style="font-size:11px;color:rgba(255,255,255,0.35);margin-top:3px;">Mentor: ${escHtml(c.mentor)}</div>` : ''}
        </div>
        <div class="status-badge ${statusClass}">${statusLabel}</div>
      </div>

      <div class="call-row">
        <a class="call-btn" href="tel:${c.phone}" onclick="markDialed(${c.id})">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.99 12 19.79 19.79 0 0 1 1.93 3.4 2 2 0 0 1 3.92 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
          <span class="call-num">${c.phone}</span>
        </a>
        <a class="wa-btn" href="https://wa.me/${waNum}" target="_blank" title="WhatsApp">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
          </svg>
        </a>
      </div>

      <div class="history-header" onclick="toggleHistory(${c.id}, this)">
        <div class="history-label">
          Call History
          <span class="history-count">${c.logs.length}</span>
        </div>
        <span class="toggle-icon">${c.logs.length ? '▾' : '▾'}</span>
      </div>
      <div class="history-list ${c.logs.length ? '' : 'collapsed'}" id="hist-${c.id}">
        ${logsHtml}
      </div>

      <button class="log-call-btn" onclick="openLogModal(${c.id})">
        + Log a call
      </button>
    </div>`;
  }).join('');
}

function toggleHistory(id, el) {
  const list = document.getElementById(`hist-${id}`);
  list.classList.toggle('collapsed');
  el.querySelector('.toggle-icon').textContent = list.classList.contains('collapsed') ? '▸' : '▾';
}

// ── Filters ─────────────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── Log Modal ───────────────────────────────────────────────────
function openLogModal(id) {
  currentLogId = id;
  selectedOutcome = '';
  const c = converts.find(x=>x.id===id);
  document.getElementById('logName').value   = c.name;
  document.getElementById('logCaller').value = '';
  document.getElementById('logNote').value   = '';
  document.querySelectorAll('.outcome-opt').forEach(o=>o.classList.remove('selected'));
  openModal('logModal');
}

function selectOutcome(btn) {
  document.querySelectorAll('.outcome-opt').forEach(o=>o.classList.remove('selected'));
  btn.classList.add('selected');
  selectedOutcome = btn.dataset.outcome;
}

function saveLog() {
  if (!selectedOutcome) { showToast('⚠ Please select a call outcome'); return; }
  const note   = document.getElementById('logNote').value.trim();
  const caller = document.getElementById('logCaller').value.trim();
  const c = converts.find(x=>x.id===currentLogId);
  c.logs.push({
    outcome: selectedOutcome, note, caller,
    date: new Date().toISOString().split('T')[0]
  });
  saveData(converts);
  closeModal('logModal');
  render();
  showToast('Call logged successfully');
}

// ── Add Convert Modal ───────────────────────────────────────────
function openAddModal() {
  ['addName','addPhone','addWhatsapp','addGroup','addMentor'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('addGender').value  = '';
  document.getElementById('addStatus').value  = 'active';
  document.getElementById('addSalvation').value = '';
  openModal('addModal');
}

function saveConvert() {
  const name  = document.getElementById('addName').value.trim();
  const phone = document.getElementById('addPhone').value.trim();
  if (!name || !phone) { showToast('⚠ Name and phone are required'); return; }
  const newId = Math.max(0, ...converts.map(c=>c.id)) + 1;
  converts.unshift({
    id: newId,
    name,
    gender:       document.getElementById('addGender').value,
    phone,
    whatsapp:     document.getElementById('addWhatsapp').value.trim(),
    salvationDate:document.getElementById('addSalvation').value,
    group:        document.getElementById('addGroup').value.trim(),
    mentor:       document.getElementById('addMentor').value.trim(),
    status:       document.getElementById('addStatus').value,
    logs: []
  });
  saveData(converts);
  closeModal('addModal');
  render();
  showToast('Convert added successfully');
}

// ── Dialed marker ───────────────────────────────────────────────
function markDialed(id) {
  // Just opens the log modal automatically after a brief delay
  setTimeout(() => openLogModal(id), 800);
}

// ── Helpers ─────────────────────────────────────────────────────
function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
function outcomeLabel(o) {
  return {reached:'✅ Reached','no-answer':'📵 No Answer',callback:'🔄 Callback',
          'follow-up':'📋 Follow-Up'}[o] || o;
}
function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Search ──────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', render);

// ── Close modals on overlay click ───────────────────────────────
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if(e.target===o) closeModal(o.id); });
});

// ── Init ────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
